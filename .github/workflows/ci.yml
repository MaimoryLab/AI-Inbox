name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [22.x, 24.x]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
      - run: git diff --check
      - if: matrix.node-version == '22.x' && matrix.os != 'ubuntu-latest'
        run: npm run release:installer
      - uses: actions/upload-artifact@v4
        if: matrix.node-version == '22.x' && matrix.os != 'ubuntu-latest'
        with:
          name: ai-inbox-${{ matrix.os }}-node-${{ matrix.node-version }}
          path: |
            artifacts/release/*.dmg
            artifacts/release/*.msi
