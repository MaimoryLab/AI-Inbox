<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Agent Memory Lab</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <main class="panel">
    <header>
      <div>
        <h1>会话同步</h1>
        <p id="status">正在检查本地工作台...</p>
      </div>
      <div class="window-actions" aria-label="窗口操作">
        <button id="openWorkbench" class="icon-btn" title="打开工作台" aria-label="打开工作台">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 4H4v4M16 4h4v4M8 20H4v-4M16 20h4v-4"></path></svg>
        </button>
        <button id="closePopup" class="icon-btn" title="关闭" aria-label="关闭">×</button>
      </div>
    </header>

    <section class="sync-card">
      <div class="sync-head">
        <span id="syncBadge" class="sync-badge">检查中</span>
        <button id="syncNow" class="text-button scan-link">补扫</button>
      </div>
      <div id="statusTitle" class="status-title">检查中</div>
      <div id="draftAssist" class="draft-assist">正在检查当前网页。</div>
    </section>

    <section class="page-card page-summary">
      <div class="label">当前页面</div>
      <div id="pageTitle" class="title">读取中...</div>
      <div id="pageUrl" class="url"></div>
      <div id="draftMeta" class="draft-meta"></div>
    </section>

    <details class="recent-card compact-history">
      <summary>最近同步</summary>
      <div id="recentList" class="recent-list">暂无记录</div>
    </details>

    <div id="message" class="message"></div>
    <div id="versionInfo" class="version-foot">Extension v0.1.0</div>
  </main>
  <script type="module" src="popup.js"></script>
</body>
</html>
