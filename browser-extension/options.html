<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI-Index Options</title>
    <style>
      body {
        max-width: 520px;
        margin: 0 auto;
        padding: 24px;
        font: 14px/1.5 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #111827;
      }
      label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
      }
      input {
        box-sizing: border-box;
        width: 100%;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        padding: 8px 10px;
        font: inherit;
      }
      button {
        margin-top: 12px;
        border: 1px solid #111827;
        border-radius: 6px;
        padding: 8px 12px;
        background: #111827;
        color: white;
        font-weight: 600;
        cursor: pointer;
      }
      #status {
        margin-top: 10px;
        color: #047857;
      }
    </style>
  </head>
  <body>
    <h1>AI-Index Options</h1>
    <label for="apiBase">API base URL</label>
    <input id="apiBase" type="url" placeholder="http://127.0.0.1:3111">
    <button id="save" type="button">Save</button>
    <div id="status" role="status"></div>
    <script src="options.js"></script>
  </body>
</html>
