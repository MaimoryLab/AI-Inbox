<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Agent Memory Lab Side Panel</title>
  <link rel="stylesheet" href="sidepanel.css" />
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div class="brand-mark" aria-hidden="true">M</div>
      <div class="brand-copy">
        <h1>会话同步</h1>
        <p id="status">正在连接本地工作台...</p>
      </div>
      <div class="window-actions" aria-label="窗口操作">
        <button id="refresh" class="icon-button" title="刷新" aria-label="刷新">↻</button>
        <button id="openWorkbench" class="icon-button" title="打开工作台" aria-label="打开工作台">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 4H4v4M16 4h4v4M8 20H4v-4M16 20h4v-4"></path></svg>
        </button>
        <button id="closePanel" class="icon-button" title="关闭" aria-label="关闭">×</button>
      </div>
    </header>

    <section id="connectionCard" class="connection-card checking">
      <div>
        <div id="connectionTitle" class="connection-title">检查连接中</div>
        <div id="connectionText" class="connection-text">正在确认能否同步到本地工作台。</div>
      </div>
      <button id="connectionAction" type="button">重试</button>
    </section>

    <section class="section sync-overview">
      <div class="sync-state-main">
        <div>
          <span class="eyebrow">同步状态</span>
          <strong id="turnSummary">0 条</strong>
        </div>
        <button id="syncNow" class="ghost-button" type="button">补扫</button>
      </div>
      <div id="draftAssist" class="draft-assist">网页里的 AI 会话会自动同步到工作台。</div>
      <div class="sync-facts">
        <span id="pageType">网页</span>
        <span id="syncMode">自动</span>
        <span id="draftMeta">只同步会话原文</span>
      </div>
    </section>

    <details class="section current-page compact-source">
      <summary>
        <span class="eyebrow">页面来源</span>
        <span id="privacy" class="type-pill">只同步会话</span>
      </summary>
      <h2 id="pageTitle">读取中...</h2>
      <p id="pageUrl" class="url"></p>
    </details>

    <details class="section secondary-section chat-section" id="chatSection" hidden>
      <summary>
        <span class="eyebrow">最近对话</span>
        <span class="count" id="turnCount">0</span>
      </summary>
      <div id="turnList" class="turn-list"></div>
    </details>

    <details class="section secondary-section ai-diagnostics" id="aiDiagnostics" hidden>
      <summary>
        <span class="eyebrow">页面识别</span>
        <span id="aiProvider" class="type-pill">AI</span>
      </summary>
      <div id="aiValidationSummary" class="validation-summary"></div>
      <div id="aiDiagnosticList" class="diagnostic-list"></div>
      <div class="section-actions debug-actions">
        <button id="copyDiagnostics" class="ghost-button" type="button" disabled>复制问题信息</button>
        <button id="copyEvidenceCommand" class="ghost-button" type="button" disabled>复制检查步骤</button>
      </div>
      <div id="evidenceCommandHint" class="command-hint" hidden>页面识别不准时再使用。</div>
    </details>

    <details class="section secondary-section">
      <summary>
        <span class="eyebrow">最近同步</span>
      </summary>
      <div id="recentList" class="recent-list empty">暂无记录</div>
    </details>

    <div id="message" class="message"></div>
  </main>
  <script type="module" src="sidepanel.js"></script>
</body>
</html>
